name: publish

# Trigger: GitHub Release publication is the human gate.
# Workflow: `gh release create vX.Y.Z --generate-notes` -> this fires.
on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build sdist + wheel
        run: uv build
      - name: Smoke-test wheel import
        run: |
          uv venv .smoke
          . .smoke/bin/activate
          uv pip install dist/*.whl
          python -c "from satsignal_otel import SatsignalSpanProcessor, APIError, auto_anchor_on_eval_fail, mark_for_anchor, __version__; print('import OK', __version__)"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/${{ github.event.repository.name }}
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (Trusted Publishers / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `password:` — its presence disables OIDC.
        # `attestations: true` is the action default; left implicit.
